<!-- index.html - Часть 1 из 2 -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry Dash Sandbox</title>
    <!-- Автоматический сброс кэша стилей при каждой загрузке страницы -->
    <script>
        const styleLink = document.createElement('link');
        styleLink.rel = 'stylesheet';
        styleLink.href = './css/style.css?v=' + Date.now();
        document.head.appendChild(styleLink);
    </script>
</head>
<body>
    <div id="gameContainer">
        <div id="objectsLayer"></div>
        <div id="cube"></div>

        <!-- ГЛАВНОЕ МЕНЮ ИГРЫ -->
        <div id="mainMenuScreen">
            <div class="menu-title">Geometry Dash Sandbox</div>
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button class="menu-btn" id="btnPlayLvl1">Уровень 1</button>
                <button class="menu-btn" id="btnPlayLvl2">Уровень 2</button>
                <button class="menu-btn" id="btnPlayLvl3">Уровень 3</button>
            </div>
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button class="menu-btn" id="btnOpenEditor" style="background: #00ff88; color: #111;">Редактор уровней</button>
                <button class="menu-btn" id="btnOpenSkins" style="background: #00bfff; color: #111;">Облик куба</button>
            </div>
            <div id="customLevelsTitle" style="color: #fff; font-size: 14px; font-weight: bold; margin-bottom: 10px;">ВАШИ КАСТОМНЫЕ УРОВНИ:</div>
            <div id="levelsListContainer" style="width: 80%; max-height: 120px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; gap: 5px;"></div>
        </div>
<!-- index.html - Часть 2 из 2 -->
        <!-- ЭКРАН ВЫБОРА ОБЛИКА (СКИНОВ) -->
        <div id="skinSelectScreen" style="display: none;">
            <div class="menu-title">Выберите Kuбик</div>
            <div style="display: flex; gap: 20px; margin-bottom: 30px;">
                <div class="skin-card selected" onclick="window.Game.selectSkin(0, this)" style="background: #e94560; width: 50px; height: 50px; border-radius: 4px; cursor: pointer; border: 3px solid #fff; box-shadow: 0 0 15px #e94560;"></div>
                <div class="skin-card" onclick="window.Game.selectSkin(1, this)" style="background: #00bfff; width: 50px; height: 50px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #000; font-size: 24px; font-weight: bold;">▲</div>
                <div class="skin-card" onclick="window.Game.selectSkin(2, this)" style="background: #ffaa00; width: 50px; height: 50px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #000; font-size: 24px; font-weight: bold;">⚡</div>
            </div>
            <button class="menu-btn" id="btnCloseSkins">Назад в меню</button>
        </div>

        <!-- ЭКРАН ИГРА ОКОНЧЕНА (GAME OVER) -->
        <div id="gameOverScreen" style="display: none;">
            <div class="menu-title" style="color: #e94560; text-shadow: 0 0 20px rgba(233,69,96,0.5);">ПОПЫТКА СЛИТА</div>
            <div id="finalScore" style="color: #fff; font-size: 20px; font-weight: bold; margin-bottom: 20px;">0%</div>
            <div style="display: flex; gap: 10px;">
                <button class="menu-btn" id="restartBtn">Рестарт</button>
                <button class="menu-btn" id="btnGameOverExit" style="background: #333; color: #fff;">В меню</button>
            </div>
        </div>

        <!-- ИНТЕРФЕЙС ГЕЙМПЛЕЯ -->
        <div id="scoreBoard">Score: <span id="scoreVal">0</span></div>
        <button id="stopTestBtn" style="position: absolute; top: 15px; right: 20px; display: none; background: #e94560; color: #fff; border: none; padding: 6px 12px; font-size: 11px; font-weight: bold; border-radius: 4px; cursor: pointer; z-index: 150;">Выйти из теста</button>

        <div id="progressBarContainer">
            <div id="progressBarFill"></div>
            <div id="progressText">0%</div>
        </div>

        <!-- ЛЕВАЯ ВЕРТИКАЛЬНАЯ ПАНЕЛЬ ТЕСТА И УПРАВЛЕНИЯ -->
        <div id="editorLeftPanel">
            <button class="side-btn" id="btnEditorExit" style="background: #e94560;">В меню</button>
            <div class="side-divider"></div>
            <button class="side-btn" id="btnStartTest" style="background: #00ff88; color: #111;">ТЕСТ</button>
            <button class="side-btn" id="btnSaveLevel" style="background: #00bfff; color: #111;">СОХРАНИТЬ</button>
            <button class="side-btn" id="btnPublishOfficial" style="background: #ffaa00; color: #111; display: none; font-size: 9px; box-shadow: 0 0 10px #ffaa00; border: 2px solid #fff;">ВЫЛОЖИТЬ</button>
            <button class="side-btn" id="btnClearLevel" style="background: #555;">ОЧИСТКА</button>
            <div class="side-divider"></div>
            <div id="musicSliderPlaceholder"></div>
        </div>

        <!-- НИЖНЯЯ ПАНЕЛЬ ИНСТРУМЕНТОВ РЕДАКТОРА -->
        <div id="editorPanel">
            <button class="tool-btn" id="btnScrollLeft" style="background: #333; min-width: 65px;">◀ Экран</button>
            <button class="tool-btn" id="btnScrollRight" style="background: #333; margin-right: 15px; min-width: 65px;">Экран ▶</button>
            
            <button class="tool-btn active" id="toolSpikeFloor">▲ Шип Пол</button>
            <button class="tool-btn" id="toolSpikeCeil">▼ Шип Пот</button>
            <button class="tool-btn" id="toolBlock">■ Блок</button>
            <button class="tool-btn" id="toolPortal">☯ Портал</button>
            <button class="tool-btn" id="toolOrbPurple">● Орб Фиол</button>
            <button class="tool-btn" id="toolOrbPink">● Орб Розовый</button>
            <button class="tool-btn" id="toolOrbRed">● Orb Красн</button>
            <button class="tool-btn" id="toolPadYellow">▬ Батут Желт</button>
            <button class="tool-btn" id="toolPink">▬ Батут Розов</button>
            <button class="tool-btn" id="toolPadRed">▬ Батут Красн</button>
            <button class="tool-btn" id="toolSlow">» Скор. 1</button>
            <button class="tool-btn" id="toolNorm">» Скор. 2</button>
            <button class="tool-btn" id="toolFast">» Скор. 3</button>
            <button class="tool-btn" id="toolEraser" style="background: #444; color: #ffaa00; margin-left: 10px;">❌ Ластик</button>
        </div>
    </div>

    <!-- ВЕЧНЫЙ АВТОМАТИЧЕСКИЙ СБРОС КЭША: Генерирует уникальный ID при каждом запуске! -->
    <script>
        const mainScript = document.createElement('script');
        mainScript.type = 'module';
        mainScript.src = './js/main.js?v=' + Date.now();
        document.body.appendChild(mainScript);
    </script>
</body>
</html>
